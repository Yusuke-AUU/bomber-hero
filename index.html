<style>
*{box-sizing:border-box;margin:0;padding:0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:#0E1B30;
  font-family:'Outfit',sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  touch-action:none;
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 55% at 50% 50%,rgba(56,120,255,0.09) 0%,transparent 70%);}

#app{
  display:flex;flex-direction:column;align-items:center;
  gap:8px;position:relative;z-index:1;
  width:100%;height:100%;
  padding:8px 0 4px;
}

/* TITLE */
#title{font-size:20px;font-weight:900;letter-spacing:4px;color:#EEF6FF;text-transform:uppercase;flex-shrink:0;}
#title em{font-style:normal;color:#7CB9FF;}

/* HUD - scrollable on mobile */
#hud{
  display:flex;gap:4px;flex-shrink:0;
  overflow-x:auto;max-width:100%;padding:0 8px;
  scrollbar-width:none;
}
#hud::-webkit-scrollbar{display:none;}
.hcard{
  background:#1A2E4A;border:1px solid rgba(80,140,255,0.2);
  border-radius:10px;padding:4px 10px;
  display:flex;align-items:center;gap:5px;
  flex-shrink:0;
}
.hicon{font-size:13px;line-height:1;}
.hinner{display:flex;flex-direction:column;}
.hlabel{font-size:6px;font-weight:700;color:rgba(160,210,255,0.5);letter-spacing:1.5px;text-transform:uppercase;}
.hval{font-size:14px;font-weight:900;color:#EEF6FF;line-height:1.1;}
.hcard.kick-on{border-color:rgba(180,100,255,0.55);box-shadow:0 0 10px rgba(168,85,247,0.25);}
.hcard.kick-on .hval{color:#C084FC;}

/* CANVAS WRAP - fills remaining space */
#cw{
  position:relative;border-radius:12px;overflow:hidden;
  border:1px solid rgba(80,140,255,0.3);
  box-shadow:0 0 0 1px rgba(0,0,0,0.4),0 12px 40px rgba(0,0,0,0.7),0 0 60px rgba(56,120,255,0.12);
  flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
}
canvas{display:block;max-width:100%;max-height:100%;object-fit:contain;}

/* OVERLAY */
#ov{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(8,16,32,0.92);backdrop-filter:blur(16px);border-radius:11px;
}
#ov.show{display:flex;}
#ov-em{font-size:48px;animation:bob 1.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#ov-t{font-size:18px;font-weight:900;color:#EEF6FF;letter-spacing:3px;text-align:center;}
#ov-s{font-size:10px;font-weight:700;color:rgba(160,210,255,0.45);animation:pulse 1.3s ease-in-out infinite;text-align:center;padding:0 16px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.15}}
.pbtn{
  background:linear-gradient(135deg,#2B6EE8,#4D8FFF);color:#fff;border:none;border-radius:50px;
  padding:11px 28px;font-size:13px;font-weight:800;
  font-family:'Outfit',sans-serif;letter-spacing:2px;cursor:pointer;
  box-shadow:0 4px 20px rgba(56,120,255,0.45);transition:transform .1s,box-shadow .1s;
}
.pbtn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(56,120,255,0.6);}
.pbtn:active{transform:translateY(1px);}

/* SWIPE HINT - mobile only */
#swipe-hint{
  display:none;
  font-size:9px;font-weight:700;color:rgba(160,210,255,0.4);
  text-align:center;flex-shrink:0;line-height:1.8;
}

/* LEGEND + KEYS - desktop only */
#legend{display:flex;gap:6px;flex-shrink:0;}
.leg{display:flex;align-items:center;gap:4px;background:#1A2E4A;border:1px solid rgba(80,140,255,0.18);border-radius:8px;padding:3px 8px;font-size:8px;font-weight:700;color:rgba(160,210,255,0.55);}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
#ci{font-size:9px;font-weight:700;color:rgba(160,210,255,0.35);text-align:center;line-height:2;flex-shrink:0;}
.kb{display:inline-block;background:#1A2E4A;border:1px solid rgba(80,140,255,0.28);color:rgba(160,210,255,0.65);padding:1px 6px;border-radius:5px;font-size:8px;font-weight:800;}

/* RESPONSIVE */
@media(max-width:680px){
  #legend,#ci{display:none;}
  #swipe-hint{display:block;}
  #title{font-size:16px;letter-spacing:3px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="title">💣 BOMBER <em>HERO</em></div>
  <div id="hud">
    <div class="hcard"><span class="hicon">❤️</span><div class="hinner"><div class="hlabel">LIFE</div><div class="hval" id="h-lives">3</div></div></div>
    <div class="hcard"><span class="hicon">💣</span><div class="hinner"><div class="hlabel">BOMB</div><div class="hval" id="h-bombs">1</div></div></div>
    <div class="hcard"><span class="hicon">🔥</span><div class="hinner"><div class="hlabel">FIRE</div><div class="hval" id="h-fire">2</div></div></div>
    <div class="hcard" id="hc-kick"><span class="hicon">🦵</span><div class="hinner"><div class="hlabel">KICK</div><div class="hval" id="h-kick">OFF</div></div></div>
    <div class="hcard"><span class="hicon">⭐</span><div class="hinner"><div class="hlabel">SCORE</div><div class="hval" id="h-score">0</div></div></div>
    <div class="hcard"><span class="hicon">🎯</span><div class="hinner"><div class="hlabel">STAGE</div><div class="hval" id="h-stage">1</div></div></div>
  </div>
  <div id="cw">
    <canvas id="canvas"></canvas>
    <div id="ov" class="show">
      <div id="ov-em">💣</div>
      <div id="ov-t">BOMBER HERO</div>
      <div id="ov-s">SPACE or TAP to start<br>スワイプで移動 / タップで爆弾</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
        <button class="pbtn" id="start-btn">▶  PLAY</button>
        <button class="pbtn" id="continue-btn" style="display:none;background:linear-gradient(135deg,#059669,#10B981);box-shadow:0 4px 20px rgba(16,185,129,0.5);">⏩  CONTINUE</button>
      </div>
      <button class="pbtn" id="reset-btn" style="display:none;background:transparent;border:1px solid rgba(148,196,255,0.2);box-shadow:none;font-size:11px;padding:7px 18px;color:rgba(148,196,255,0.5);">🔄 ステージ1からリスタート</button>
      <div id="save-info" style="font-size:9px;color:rgba(148,196,255,0.35);font-weight:700;letter-spacing:1px;text-align:center;"></div>
    </div>
  </div>
  <div id="swipe-hint">👆 タップ: 爆弾　👆 スワイプ: 移動　🦵 KICKあり: 爆弾へスワイプ</div>
  <div id="legend">
    <div class="leg"><div class="ldot" style="background:#D97706"></div>💣 爆弾+1</div>
    <div class="leg"><div class="ldot" style="background:#DC2626"></div>🔥 火力+1</div>
    <div class="leg"><div class="ldot" style="background:#059669"></div>⚡ スピード+1</div>
    <div class="leg"><div class="ldot" style="background:#7C3AED"></div>🦵 爆弾キック</div>
  </div>
  <div id="ci">
    <span class="kb">↑↓←→</span>/<span class="kb">WASD</span> 移動　<span class="kb">SPACE</span>/<span class="kb">Z</span> 爆弾　KICK取得後: 爆弾に向かって歩くとキック
  </div>
</div>
<script>
const COLS=15,ROWS=13;
let CELL=38;
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');

// Responsive canvas sizing
function resizeCanvas(){
  const isMobile=window.innerWidth<=680;
  if(isMobile){
    // Mobile: fit to screen width, leave room for HUD and hint
    const hudH=90; // approx HUD + title + hint
    const maxW=window.innerWidth-16;
    const maxH=window.innerHeight-hudH;
    const cellW=Math.floor(maxW/COLS);
    const cellH=Math.floor(maxH/ROWS);
    CELL=Math.max(20,Math.min(cellW,cellH));
  } else {
    // Desktop: fixed comfortable size
    const maxH=window.innerHeight-160; // leave room for HUD/legend
    const maxW=window.innerWidth-40;
    const cellW=Math.floor(maxW/COLS);
    const cellH=Math.floor(maxH/ROWS);
    CELL=Math.max(32,Math.min(cellW,cellH,52));
  }
  cv.width=COLS*CELL;cv.height=ROWS*CELL;
}
resizeCanvas();
window.addEventListener('resize',()=>{resizeCanvas();});

const WALL=1,SOFT=2,EMPTY=0,IB='B',IF2='F',IS='S',IK='K';
const DIRS=[[0,-1],[1,0],[0,1],[-1,0]];
const ESTYLES=[
  {body:'#6D28D9',helm:'#4C1D95',shine:'rgba(196,181,253,0.9)'},
  {body:'#B91C1C',helm:'#7F1D1D',shine:'rgba(252,165,165,0.9)'},
  {body:'#065F46',helm:'#022C22',shine:'rgba(110,231,183,0.9)'},
  {body:'#B45309',helm:'#78350F',shine:'rgba(252,211,77,0.9)'},
  {body:'#BE185D',helm:'#831843',shine:'rgba(249,168,212,0.9)'},
];
let G={},keys={},lastBK=false,started=false;

function newPlayer(){return{x:1,y:1,alive:true,mt:0,md:165,bombs:1,fire:2,spd:1,kick:false,inv:0,ldx:0,ldy:0};}

function initGame(stage){
  const lv=stage||1;
  G={stage:lv,grid:[],player:newPlayer(),bombs:[],flames:[],parts:[],enemies:[],items:[],
    lives:G.lives!=null?G.lives:3,score:G.score||0,over:false,clear:false,shake:0};
  for(let r=0;r<ROWS;r++){G.grid[r]=[];for(let c=0;c<COLS;c++)
    G.grid[r][c]=(r===0||r===ROWS-1||c===0||c===COLS-1)?WALL:(r%2===0&&c%2===0)?WALL:EMPTY;}
  const safe=[[1,1],[2,1],[1,2],[COLS-2,ROWS-2],[COLS-3,ROWS-2],[COLS-2,ROWS-3]];
  for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++)
    if(G.grid[r][c]===EMPTY&&!safe.some(([sc,sr])=>sc===c&&sr===r)&&Math.random()<0.42)G.grid[r][c]=SOFT;
  const ec=Math.min(2+(lv-1)*2,8);let tr=0;
  while(G.enemies.length<ec&&tr++<800){
    const ex=Math.floor(Math.random()*(COLS-2))+1,ey=Math.floor(Math.random()*(ROWS-2))+1;
    if(G.grid[ey][ex]===EMPTY&&!(ex<=2&&ey<=2)&&!G.enemies.some(e=>e.x===ex&&e.y===ey)){
      const s=ESTYLES[G.enemies.length%ESTYLES.length];
      G.enemies.push({x:ex,y:ey,dir:Math.floor(Math.random()*4),mt:0,
        md:Math.max(200,460-lv*40),alive:true,bombTimer:0,
        bombInterval:Math.max(2500,6000-lv*500),bombs:1,fire:2,...s});
    }
  }
}

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(!started&&e.code==='Space'){
    started=true;
    if(!loadSave()){G.lives=3;G.score=0;initGame(1);}
    else{const sv=loadSave();G.lives=sv.lives||3;G.score=sv.score||0;initGame(sv.stage||1);}
    hideOv();requestAnimationFrame(loop);
  }
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

function setupTouch(){
  let tx0=0,ty0=0,tMoved=false;
  const SWIPE_THRESH=18; // px minimum for swipe

  cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    tx0=t.clientX;ty0=t.clientY;tMoved=false;
  },{passive:false});

  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    const dx=t.clientX-tx0,dy=t.clientY-ty0;
    if(Math.abs(dx)>SWIPE_THRESH||Math.abs(dy)>SWIPE_THRESH) tMoved=true;
  },{passive:false});

  cv.addEventListener('touchend',e=>{
    e.preventDefault();
    if(!started){startGame();return;}
    const t=e.changedTouches[0];
    const dx=t.clientX-tx0,dy=t.clientY-ty0;
    const adx=Math.abs(dx),ady=Math.abs(dy);

    if(!tMoved||Math.max(adx,ady)<SWIPE_THRESH){
      // TAP → place bomb
      placeBomb(null);
    } else {
      // SWIPE → move
      if(adx>ady){
        // horizontal
        if(dx>0) doMove(1,0);
        else doMove(-1,0);
      } else {
        if(dy>0) doMove(0,1);
        else doMove(0,-1);
      }
    }
  },{passive:false});

  // Also handle overlay tap to start
  document.getElementById('ov').addEventListener('touchend',e=>{
    if(!started && e.target.tagName!=='BUTTON'){e.preventDefault();startGame();}
  });
}
document.getElementById('start-btn').addEventListener('click',()=>{
  if(started)return;
  G.lives=3;G.score=0;started=true;initGame(1);hideOv();requestAnimationFrame(loop);
});

function startGame(){
  if(started)return;
  started=true;
  const sv=loadSave();
  if(sv&&sv.stage>1){G.lives=sv.lives||3;G.score=sv.score||0;initGame(sv.stage);}
  else{G.lives=3;G.score=0;initGame(1);}
  hideOv();requestAnimationFrame(loop);
}

// Immediate 1-cell move for swipe (no timer delay)
function doMove(dx,dy){
  if(!started||G.over||G.clear||!G.player.alive)return;
  const p=G.player;
  p.ldx=dx;p.ldy=dy;
  const nx=p.x+dx,ny=p.y+dy;
  if(canWalk(nx,ny)){
    if(hasBomb(nx,ny)){if(p.kick)kickBomb(p.x,p.y,dx,dy);}
    else{p.x=nx;p.y=ny;p.mt=0;pickItem(nx,ny);}
  }
}
function setupTitleScreen(){
  const sv=loadSave();
  const saveInfo=document.getElementById('save-info');
  const continueBtn=document.getElementById('continue-btn');
  const resetBtn=document.getElementById('reset-btn');
  const startBtn=document.getElementById('start-btn');
  if(sv&&sv.stage>1){
    continueBtn.style.display='block';
    continueBtn.textContent='⏩  STG '+sv.stage+' から続ける';
    continueBtn.onclick=()=>{
      if(!started){started=true;requestAnimationFrame(loop);}
      G.lives=sv.lives||3;G.score=sv.score||0;initGame(sv.stage);hideOv();
    };
    resetBtn.style.display='block';
    resetBtn.textContent='🔄 最初から始める';
    resetBtn.onclick=()=>{
      clearSave();
      if(!started){started=true;requestAnimationFrame(loop);}
      G.lives=3;G.score=0;initGame(1);hideOv();
    };
    saveInfo.textContent=formatSaveInfo(sv);
    startBtn.style.display='none';
  }
}
setupTitleScreen();

function canWalk(x,y){
  if(x<0||x>=COLS||y<0||y>=ROWS)return false;
  if(G.grid[y][x]===WALL||G.grid[y][x]===SOFT)return false;
  return true;
}
function hasBomb(x,y){return G.bombs.some(b=>b.x===x&&b.y===y);}

function kickBomb(px,py,dx,dy){
  const nx=px+dx,ny=py+dy;
  const b=G.bombs.find(bm=>bm.x===nx&&bm.y===ny&&!bm.moving);
  if(!b)return false;
  // Find how far it can slide
  b.moving=true;b.mdx=dx;b.mdy=dy;
  return true;
}

function handleInput(dt){
  if(G.over||G.clear||!G.player.alive)return;
  const p=G.player;p.mt+=dt;
  if(p.mt>=p.md){
    let dx=0,dy=0;
    if(keys['ArrowUp']||keys['KeyW'])dy=-1;
    else if(keys['ArrowDown']||keys['KeyS'])dy=1;
    else if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
    else if(keys['ArrowRight']||keys['KeyD'])dx=1;
    if(dx||dy){
      p.ldx=dx;p.ldy=dy;
      const nx=p.x+dx,ny=p.y+dy;
      if(canWalk(nx,ny)){
        if(hasBomb(nx,ny)){
          if(p.kick)kickBomb(p.x,p.y,dx,dy);
          // can't walk into bomb
        }else{
          p.x=nx;p.y=ny;p.mt=0;
          pickItem(nx,ny);
        }
      }
    }else p.mt=p.md;
  }
  const bk=keys['Space']||keys['KeyZ'];
  if(bk&&!lastBK)placeBomb(null);
  lastBK=bk;
  if(p.inv>0)p.inv-=dt;
}

function pickItem(x,y){
  const i=G.items.findIndex(it=>it.x===x&&it.y===y);if(i<0)return;
  const it=G.items.splice(i,1)[0],p=G.player;
  if(it.type===IB)p.bombs=Math.min(p.bombs+1,6);
  if(it.type===IF2)p.fire=Math.min(p.fire+1,8);
  if(it.type===IS){p.spd=Math.min(p.spd+1,4);p.md=Math.max(85,p.md-22);}
  if(it.type===IK)p.kick=true;
  G.score+=100;
  pts(x,y,it.type===IB?'#F59E0B':it.type===IF2?'#EF4444':it.type===IS?'#10B981':'#A855F7',12);
}

function placeBomb(owner){
  const src=owner||G.player;
  if(!src.alive)return;
  if(!owner&&(G.over||G.clear))return;
  const{x,y}=src;
  if(G.bombs.filter(b=>b.owner===src).length>=src.bombs)return;
  if(hasBomb(x,y))return;
  G.bombs.push({x,y,t:0,delay:owner?2500:2800,owner:src,fl:src.fire,moving:false,mdx:0,mdy:0,speed:0});
}

const BSPEED=7;
function updateBombs(dt){
  // Move sliding bombs
  G.bombs.forEach(b=>{
    if(!b.moving)return;
    const step=BSPEED*CELL*(dt/1000);
    // Compute next cell in slide direction
    const nx=b.x+b.mdx,ny=b.y+b.mdy;
    // Check if next cell is free
    if(!canWalk(nx,ny)||hasBomb(nx,ny)){
      b.moving=false;return;
    }
    // Slide
    b.speed=(b.speed||0)+step;
    if(b.speed>=CELL){
      b.speed-=CELL;b.x=nx;b.y=ny;
      // Moving bomb does NOT kill — only explosion does
      // Check if next cell after this is blocked -> stop
      const nx2=b.x+b.mdx,ny2=b.y+b.mdy;
      if(!canWalk(nx2,ny2)||hasBomb(nx2,ny2))b.moving=false;
    }
  });
  // Explode
  const ex=[];
  G.bombs.forEach(b=>{b.t+=dt;if(b.t>=b.delay)ex.push(b);});
  ex.forEach(b=>{G.bombs=G.bombs.filter(x=>x!==b);explode(b);});
}

function explode(b){
  G.shake=260;flame(b.x,b.y);
  DIRS.forEach(([dx,dy])=>{
    for(let i=1;i<=b.fl;i++){
      const nx=b.x+dx*i,ny=b.y+dy*i;
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS)break;
      if(G.grid[ny][nx]===WALL)break;
      flame(nx,ny);
      if(G.grid[ny][nx]===SOFT){
        G.grid[ny][nx]=EMPTY;G.score+=20;pts(nx,ny,'#D97706',12);
        const r=Math.random();
        G.items.push({x:nx,y:ny,type:r<0.27?IB:r<0.54?IF2:r<0.78?IS:IK,bob:Math.random()*Math.PI*2});
        break;
      }
    }
  });
}

function flame(x,y){
  const ef=G.flames.find(f=>f.x===x&&f.y===y);if(ef){ef.t=700;return;}
  G.flames.push({x,y,t:700});pts(x,y,'#FB923C',5);
  const bi=G.bombs.findIndex(b=>b.x===x&&b.y===y);
  if(bi>=0){const b=G.bombs.splice(bi,1)[0];explode(b);}
  // Destroy items in flame
  const ii=G.items.findIndex(it=>it.x===x&&it.y===y);
  if(ii>=0){pts(x,y,'#94A3B8',6);G.items.splice(ii,1);}
  G.enemies.forEach(e=>{if(e.alive&&e.x===x&&e.y===y){e.alive=false;G.score+=300;pts(x,y,e.shine,20);}});
  if(G.player.x===x&&G.player.y===y&&G.player.inv<=0)killPlayer();
}
function updateFlames(dt){G.flames.forEach(f=>f.t-=dt);G.flames=G.flames.filter(f=>f.t>0);}

function isDangerCell(x,y){
  // Is this cell in any bomb's blast range?
  for(const b of G.bombs){
    if(b.x===x&&b.y===y)return true;
    for(const[dx,dy]of DIRS){
      for(let i=1;i<=b.fl;i++){
        const bx=b.x+dx*i,by=b.y+dy*i;
        if(bx<0||bx>=COLS||by<0||by>=ROWS||G.grid[by][bx]===WALL)break;
        if(bx===x&&by===y)return true;
        if(G.grid[by][bx]===SOFT)break;
      }
    }
  }
  // Also avoid active flames
  return G.flames.some(f=>f.x===x&&f.y===y);
}

function updateEnemies(dt){
  G.enemies.forEach(e=>{
    if(!e.alive)return;
    e.mt+=dt;
    if(e.mt>=e.md){
      e.mt=0;
      const inDanger=isDangerCell(e.x,e.y);
      if(inDanger){
        // Flee mode: pick a safe adjacent cell
        const safeDirs=DIRS.filter(([dx,dy])=>{
          const nx=e.x+dx,ny=e.y+dy;
          return canWalk(nx,ny)&&!hasBomb(nx,ny)&&!isDangerCell(nx,ny);
        });
        if(safeDirs.length>0){
          const[dx,dy]=safeDirs[Math.floor(Math.random()*safeDirs.length)];
          e.x+=dx;e.y+=dy;
        } else {
          // No safe cell, try any open cell
          for(let t=0;t<4;t++){
            const[dx,dy]=DIRS[e.dir],nx=e.x+dx,ny=e.y+dy;
            if(canWalk(nx,ny)&&!hasBomb(nx,ny)){e.x=nx;e.y=ny;break;}
            e.dir=(e.dir+1)%4;
          }
        }
      } else {
        // Normal roaming
        if(Math.random()<0.3)e.dir=Math.floor(Math.random()*4);
        for(let t=0;t<4;t++){
          const[dx,dy]=DIRS[e.dir],nx=e.x+dx,ny=e.y+dy;
          if(canWalk(nx,ny)&&!hasBomb(nx,ny)){e.x=nx;e.y=ny;break;}
          e.dir=(e.dir+1)%4;
        }
      }
      if(e.x===G.player.x&&e.y===G.player.y&&G.player.inv<=0)killPlayer();
      // Enemy picks up items!
      const ii=G.items.findIndex(it=>it.x===e.x&&it.y===e.y);
      if(ii>=0){
        const it=G.items.splice(ii,1)[0];
        if(it.type===IB)e.bombs=Math.min((e.bombs||1)+1,4);
        if(it.type===IF2)e.fire=Math.min((e.fire||2)+1,6);
        if(it.type===IS)e.md=Math.max(120,e.md-20);
        if(it.type===IK)e.kick=true;
        pts(e.x,e.y,e.shine,8);
      }
    }
    e.bombTimer+=dt;
    if(e.bombTimer>=e.bombInterval){
      e.bombTimer=0;
      const dist=Math.abs(e.x-G.player.x)+Math.abs(e.y-G.player.y);
      // Self-blast check: would placing a bomb here hit self after explosion?
      const safeToPlace=()=>{
        // Check if enemy is in its own bomb's blast path
        // A bomb at (e.x,e.y) with fire e.fire will hit cells along 4 dirs
        for(const[dx,dy]of DIRS){
          for(let i=1;i<=e.fire;i++){
            const bx=e.x+dx*i,by=e.y+dy*i;
            if(bx<0||bx>=COLS||by<0||by>=ROWS||G.grid[by][bx]===WALL)break;
            // If this blast cell equals enemy pos after 1 step away... 
            // Actually: enemy is AT e.x,e.y, so center always hits self
            // We need: can enemy escape before bomb explodes?
            // Simple check: at least 1 open adjacent cell to flee to
            if(G.grid[by][bx]===SOFT)break;
          }
        }
        // Count open escape routes from current position
        let exits=0;
        for(const[dx,dy]of DIRS){
          const nx=e.x+dx,ny=e.y+dy;
          if(canWalk(nx,ny)&&!hasBomb(nx,ny))exits++;
        }
        // Need at least 1 escape route (not too strict)
        return exits>=1;
      };
      if(safeToPlace()){
        if(dist<8&&Math.random()<0.6)placeBomb(e);
        else if(Math.random()<0.2)placeBomb(e);
      }
    }
  });
}

function killPlayer(){
  if(!G.player.alive)return;
  G.player.alive=false;G.lives--;
  pts(G.player.x,G.player.y,'#60A5FA',22);G.shake=500;
  if(G.lives<=0){
    G.over=true;
    // Save the stage reached so player can continue from here
    saveGame(G.stage,0,3);
    setTimeout(()=>showOv('💀','GAME OVER','セーブ済ステージから再挑戦できます',true),900);
  }
  else setTimeout(()=>{if(!G.over){G.player.x=1;G.player.y=1;G.player.alive=true;G.player.inv=2500;}},1000);
}

function checkClear(){
  if(G.clear||G.over)return;
  if(G.enemies.every(e=>!e.alive)){
    G.clear=true;G.score+=1000;
    // Auto-save on stage clear
    saveGame(G.stage+1,G.score,G.lives);
    setTimeout(()=>{
      showOv('🎉','STAGE '+G.stage+' CLEAR!','次のステージへ...',false);
      setTimeout(()=>{const lv=G.lives,sc=G.score;initGame(G.stage+1);G.lives=lv;G.score=sc;hideOv();},2200);
    },400);
  }
}

// ── SAVE / LOAD ──────────────────────────────────────────
const SAVE_KEY='bomberHeroSave';
function saveGame(stage,score,lives){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({stage,score,lives,ts:Date.now()}));
  }catch(e){}
}
function loadSave(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    return raw?JSON.parse(raw):null;
  }catch(e){return null;}
}
function clearSave(){
  try{localStorage.removeItem(SAVE_KEY);}catch(e){}
}
function formatSaveInfo(sv){
  if(!sv)return '';
  const d=new Date(sv.ts);
  const dateStr=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `セーブ: STAGE ${sv.stage}  SCORE ${sv.score}  (${dateStr})`;
}

function pts(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4;
    G.parts.push({x:x*CELL+CELL/2,y:y*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.02+Math.random()*0.04,sz:2+Math.random()*5,color});
  }
}
function updateParts(dt){G.parts.forEach(p=>{p.x+=p.vx*dt*.06;p.y+=p.vy*dt*.06;p.vy+=.1;p.life-=p.decay;});G.parts=G.parts.filter(p=>p.life>0);}

// ─── DRAW ──────────────────────────────────────────────────
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function drawGrid(){
  // First pass: draw all floors
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const v=G.grid[r][c],cx=c*CELL,cy=r*CELL;
    if(v!==WALL){
      // Bright floor - clear walkable area
      ctx.fillStyle=(r+c)%2?'#2A3F5C':'#304868';
      ctx.fillRect(cx,cy,CELL,CELL);
    }
  }
  // Second pass: draw walls on top with strong 3D effect
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const v=G.grid[r][c],cx=c*CELL,cy=r*CELL;
    if(v===WALL){
      // Dark wall body - very distinct from bright floor
      ctx.fillStyle='#0C1624';
      ctx.fillRect(cx,cy,CELL,CELL);
      // Top bevel (lighter) - 3D raised effect
      ctx.fillStyle='#1E3356';
      ctx.fillRect(cx,cy,CELL,5);
      // Left bevel
      ctx.fillStyle='#172B48';
      ctx.fillRect(cx,cy,3,CELL);
      // Inner face
      ctx.fillStyle='#0E1E34';
      ctx.fillRect(cx+3,cy+5,CELL-3,CELL-5);
      // Top-left corner highlight
      ctx.fillStyle='rgba(100,160,255,0.12)';
      ctx.fillRect(cx+1,cy+1,CELL-2,3);
      // Bottom shadow
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.fillRect(cx,cy+CELL-3,CELL,3);
    } else if(v===SOFT){
      // Crate on bright floor
      ctx.fillStyle='#6B4C2A';rr(cx+3,cy+3,CELL-6,CELL-6,5);ctx.fill();
      ctx.fillStyle='#8F6535';rr(cx+3,cy+3,CELL-6,7,5);ctx.fill();
      // Cross planks
      ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(cx+CELL/2,cy+5);ctx.lineTo(cx+CELL/2,cy+CELL-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+6,cy+CELL/2);ctx.lineTo(cx+CELL-6,cy+CELL/2);ctx.stroke();
      ctx.strokeStyle='rgba(255,200,100,0.1)';ctx.lineWidth=1;rr(cx+3,cy+3,CELL-6,CELL-6,5);ctx.stroke();
    }
  }
  // Subtle floor grid lines only on walkable cells
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(G.grid[r][c]!==WALL){
      ctx.strokeRect(c*CELL+.5,r*CELL+.5,CELL-1,CELL-1);
    }
  }
}

function drawFlames(){
  G.flames.forEach(f=>{
    const ratio=f.t/700,cx=f.x*CELL+CELL/2,cy=f.y*CELL+CELL/2;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,CELL*.62);
    g.addColorStop(0,`rgba(255,240,80,${.98*ratio})`);
    g.addColorStop(.3,`rgba(255,100,0,${.85*ratio})`);
    g.addColorStop(.65,`rgba(200,20,0,${.4*ratio})`);
    g.addColorStop(1,'rgba(180,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(f.x*CELL,f.y*CELL,CELL,CELL);
    ctx.fillStyle=`rgba(255,255,200,${.9*ratio})`;ctx.beginPath();ctx.arc(cx,cy,6*ratio,0,Math.PI*2);ctx.fill();
  });
}

function getBombRenderPos(b){
  if(!b.moving)return{px:b.x*CELL,py:b.y*CELL};
  // Interpolate pixel position based on speed progress
  const frac=(b.speed||0)/CELL;
  return{px:(b.x-b.mdx)*CELL+b.mdx*frac*CELL+b.mdx*CELL*(1-frac),
         py:(b.y-b.mdy)*CELL+b.mdy*frac*CELL+b.mdy*CELL*(1-frac)};
}

function drawBombs(){
  const now=Date.now();
  G.bombs.forEach(b=>{
    const ratio=b.t/b.delay,urg=ratio>.6;
    const pulse=Math.sin(now*(urg?22:9)*.01)*(urg?3:1.5);
    const{px,py}=getBombRenderPos(b);
    const cx=px+CELL/2,cy=py+CELL/2,rad=12+pulse;
    if(urg){const gg=ctx.createRadialGradient(cx,cy,rad,cx,cy,rad+14);gg.addColorStop(0,'rgba(239,68,68,.4)');gg.addColorStop(1,'rgba(239,68,68,0)');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cx,cy,rad+14,0,Math.PI*2);ctx.fill();}
    if(b.moving){const mg=ctx.createRadialGradient(cx,cy,0,cx,cy,rad+12);mg.addColorStop(0,'rgba(96,165,250,.6)');mg.addColorStop(1,'rgba(96,165,250,0)');ctx.fillStyle=mg;ctx.beginPath();ctx.arc(cx,cy,rad+12,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(cx+2,cy+rad+3,rad*.7,3.5,0,0,Math.PI*2);ctx.fill();
    const bg=ctx.createRadialGradient(cx-4,cy-4,1,cx,cy,rad);
    bg.addColorStop(0,urg?'#FF6B6B':b.moving?'#60A5FA':'#3A4A6A');
    bg.addColorStop(1,urg?'#7F1D1D':b.moving?'#1E3A8A':'#0D1320');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(cx-4,cy-4,4,0,Math.PI*2);ctx.fill();
    const fc=urg?'#EF4444':ratio>.4?'#F97316':'#FCD34D';
    ctx.strokeStyle=fc;ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx+rad*.6,cy-rad*.6);ctx.quadraticCurveTo(cx+rad+5,cy-rad-3+pulse,cx+rad+3,cy-rad-10+pulse);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(cx+rad+3,cy-rad-10+pulse,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=fc;ctx.beginPath();ctx.arc(cx+rad+3,cy-rad-10+pulse,4.5,0,Math.PI*2);ctx.fill();
    if(b.moving){
      const arr=['↑','→','↓','←'],di=b.mdy<0?0:b.mdx>0?1:b.mdy>0?2:3;
      ctx.fillStyle='rgba(147,197,253,.95)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(arr[di],cx,cy+1);
    }
  });
}

function drawItems(){
  const now=Date.now();
  const cfg={
    [IB]:{bg:'#92400E',top:'#B45309',border:'rgba(245,158,11,.6)',glow:'rgba(245,158,11,.18)',label:'BOMB',em:'💣',lc:'#FDE68A'},
    [IF2]:{bg:'#7F1D1D',top:'#991B1B',border:'rgba(239,68,68,.6)',glow:'rgba(239,68,68,.18)',label:'FIRE',em:'🔥',lc:'#FCA5A5'},
    [IS]:{bg:'#022C22',top:'#065F46',border:'rgba(16,185,129,.6)',glow:'rgba(16,185,129,.18)',label:'SPD',em:'⚡',lc:'#6EE7B7'},
    [IK]:{bg:'#3B0764',top:'#581C87',border:'rgba(168,85,247,.6)',glow:'rgba(168,85,247,.22)',label:'KICK',em:'🦵',lc:'#DDD6FE'},
  };
  G.items.forEach(it=>{
    const bob=Math.sin(now*.003+(it.bob||0))*3,c=cfg[it.type];
    const cx=it.x*CELL+CELL/2,cy=it.y*CELL+CELL/2+bob,iy=it.y*CELL+bob;
    ctx.fillStyle=c.glow;ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c.bg;rr(it.x*CELL+3,iy+3,CELL-6,CELL-6,7);ctx.fill();
    ctx.fillStyle=c.top;rr(it.x*CELL+3,iy+3,CELL-6,8,7);ctx.fill();
    ctx.strokeStyle=c.border;ctx.lineWidth=1.5;rr(it.x*CELL+3,iy+3,CELL-6,CELL-6,7);ctx.stroke();
    ctx.font=`${CELL*.34}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.em,cx,cy-3);
    ctx.font='bold 7px Outfit,sans-serif';ctx.fillStyle=c.lc;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.label,cx,cy+9);
  });
}

function drawChar(rx,ry,bodyC,helmC,shineC,blink,isEnemy){
  if(blink)return;
  const cx=rx+CELL/2,cy=ry+CELL/2;
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(cx,cy+14,11,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=bodyC;ctx.fillRect(cx-7,cy+6,6,9);ctx.fillRect(cx+1,cy+6,6,9);
  ctx.fillStyle=bodyC;rr(cx-11,cy-5,22,16,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.06)';rr(cx-10,cy-4,14,5,3);ctx.fill();
  ctx.fillStyle=bodyC;ctx.fillRect(cx-15,cy-3,5,12);ctx.fillRect(cx+10,cy-3,5,12);
  ctx.fillStyle='#E0B89A';ctx.fillRect(cx-3,cy-7,6,5);
  ctx.fillStyle='#FFD4A8';ctx.beginPath();ctx.arc(cx,cy-12,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=helmC;
  ctx.beginPath();ctx.arc(cx,cy-12,11,Math.PI*.9,Math.PI*.1,false);ctx.fill();
  ctx.fillRect(cx-11,cy-13,4,5);ctx.fillRect(cx+7,cy-13,4,5);
  ctx.fillStyle=shineC;ctx.beginPath();ctx.arc(cx-3,cy-18,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=isEnemy?'rgba(255,80,80,.25)':'rgba(80,180,255,.25)';rr(cx-7,cy-15,14,5,2);ctx.fill();
  ctx.fillStyle=isEnemy?'#FF5252':'#1a1a1a';
  ctx.beginPath();ctx.arc(cx-3,cy-12,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+3,cy-12,2.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.beginPath();ctx.arc(cx-2,cy-13,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+4,cy-13,1,0,Math.PI*2);ctx.fill();
  if(!isEnemy&&G.player.kick){
    ctx.font='10px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🦵',cx+12,cy-17);
  }
}

function drawPlayer(){
  const p=G.player;if(!p.alive)return;
  const blink=p.inv>0&&Math.floor(p.inv/110)%2===0;
  drawChar(p.x*CELL,p.y*CELL,'#1D4ED8','#1E40AF','rgba(147,197,253,.9)',blink,false);
}
function drawEnemies(){
  G.enemies.forEach(e=>{if(!e.alive)return;drawChar(e.x*CELL,e.y*CELL,e.body,e.helm,e.shine,false,true);});
}
function drawParts(){
  G.parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,p.sz*p.life),0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}

function updateHUD(){
  const p=G.player;
  document.getElementById('h-lives').textContent=G.lives;
  document.getElementById('h-score').textContent=G.score;
  document.getElementById('h-bombs').textContent=p.bombs;
  document.getElementById('h-fire').textContent=p.fire;
  document.getElementById('h-kick').textContent=p.kick?'ON':'OFF';
  document.getElementById('h-stage').textContent=G.stage;
  document.getElementById('hc-kick').classList.toggle('kick-on',p.kick);
}
function showOv(em,ti,su,hasR){
  document.getElementById('ov-em').textContent=em;
  document.getElementById('ov-t').textContent=ti;
  document.getElementById('ov-s').textContent=su;
  const startBtn=document.getElementById('start-btn');
  const continueBtn=document.getElementById('continue-btn');
  const resetBtn=document.getElementById('reset-btn');
  const saveInfo=document.getElementById('save-info');
  const sv=loadSave();

  if(hasR){
    // Game over screen
    startBtn.style.display='none';
    continueBtn.style.display='block';
    continueBtn.textContent='⏩  STG '+( sv?sv.stage:1)+' から再挑戦';
    continueBtn.onclick=()=>{
      const s=loadSave();
      if(!started){started=true;requestAnimationFrame(loop);}
      G.lives=3;G.score=s?s.score:0;
      G.over=false;G.clear=false;
      initGame(s?s.stage:1);hideOv();
    };
    resetBtn.style.display='block';
    resetBtn.onclick=()=>{
      clearSave();
      if(!started){started=true;requestAnimationFrame(loop);}
      G.lives=3;G.score=0;G.over=false;G.clear=false;
      initGame(1);hideOv();
    };
    saveInfo.textContent=sv?formatSaveInfo(sv):'';
  } else {
    // Stage clear / title
    startBtn.style.display='block';
    continueBtn.style.display='none';
    resetBtn.style.display='none';
    saveInfo.textContent='';
  }
  document.getElementById('ov').classList.add('show');
}
function hideOv(){document.getElementById('ov').classList.remove('show');}

let last=null;
function loop(ts){
  if(!last)last=ts;const dt=Math.min(ts-last,50);last=ts;
  if(!G.over&&!G.clear){handleInput(dt);updateBombs(dt);updateFlames(dt);updateEnemies(dt);updateParts(dt);checkClear();}
  else updateParts(dt);
  let sx=0,sy=0;
  if(G.shake>0){G.shake-=dt;const m=Math.min(G.shake/70,5);sx=(Math.random()-.5)*m;sy=(Math.random()-.5)*m;}
  ctx.save();ctx.translate(sx,sy);ctx.clearRect(-10,-10,cv.width+20,cv.height+20);
  drawGrid();drawItems();drawFlames();drawParts();drawBombs();drawEnemies();drawPlayer();
  ctx.restore();updateHUD();
  requestAnimationFrame(loop);
}
setupTouch();
(function tl(){if(started)return;ctx.fillStyle='#1A2B42';ctx.fillRect(0,0,cv.width,cv.height);for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){const isWall=(r===0||r===ROWS-1||c===0||c===COLS-1)||(r%2===0&&c%2===0);ctx.fillStyle=isWall?'#0C1624':(r+c)%2?'#2A3F5C':'#304868';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);}requestAnimationFrame(tl);})();
</script>
